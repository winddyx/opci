name: OpenWrt

on:
  push:
    branches: [main]
    paths: [config]
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: v25.12.2
  CONFIG_FILE: config
  UPLOAD_FIRMWARE: true
  UPLOAD_BIN_DIR: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 清理冗余文件，释放空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          # 安装编译依赖
          sudo apt update -qq
          sudo apt install -yqq build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget
          # 系统清理
          sudo apt autoremove --purge -yqq
          sudo apt clean -qq
          sudo timedatectl set-timezone "$TZ"
          # 创建工作目录
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone OpenWrt source
        working-directory: /workdir
        run: |
          df -hT
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          # 更新软件源
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom config
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config

      - name: Download dependencies
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j1
          # 清理损坏的安装包
          find dl -size -1024c -delete

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          make -j1 V=s
          # 修复：替换废弃的 set-output 语法
          echo "status=success" >> $GITHUB_OUTPUT
          # 生成设备名称和时间戳
          echo "DEVICE_NAME=_$(grep -oP 'CONFIG_TARGET.*DEVICE_\K.*(?=y)' .config | head -1)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check disk space
        if: ${{ !cancelled() }}
        run: df -hT

      - name: Upload full bin directory
        uses: actions/upload-artifact@v4
        if: ${{ steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' }}
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin
