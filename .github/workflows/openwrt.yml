name: OpenWrt

on:
  push:
    branches: [main]
    paths: [config]
  repository_dispatch:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: v25.12.4
  CONFIG_FILE: config
  UPLOAD_BIN_DIR: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Phase 1: Environment Setup ──
      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -qq
          sudo apt install -yqq build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools \
            rsync swig unzip zlib1g-dev file wget
          sudo apt autoremove --purge -yqq && sudo apt clean -qq
          sudo timedatectl set-timezone "$TZ"

      # ── Phase 2: Source & Cache ──
      - name: Clone OpenWrt source
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a

      # Cache must come AFTER clone (paths are inside openwrt/)
      - name: Cache download directory
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('config/**') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Cache build directories
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir
          key: ${{ runner.os }}-build-${{ hashFiles('config/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      # ── Phase 3: Configuration ──
      - name: Load custom config & files
        run: |
          [ -d files ] && mv files openwrt/files || true
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config || true

      # ── Phase 4: Download & Compile ──
      - name: Download dependencies
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc) 2>/dev/null || true
          find dl -size -1024c -delete

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          DEVICE_NAME=$(grep -oP 'CONFIG_TARGET.*DEVICE_\K.*(?=y)' .config 2>/dev/null | head -1 || echo "unknown")
          FILE_DATE=$(date +"%Y%m%d%H%M")
          echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          echo "FILE_DATE=_${FILE_DATE}" >> $GITHUB_ENV
          make -j$(nproc) V=s 2>&1 | tee build.log

      # ── Phase 5: Artifacts & Cleanup ──
      - name: Check disk space
        if: ${{ !cancelled() }}
        run: df -hT

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: ${{ steps.compile.outcome == 'success' && env.UPLOAD_BIN_DIR == 'true' }}
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin
          retention-days: 14

      - name: Cleanup workspace
        if: ${{ always() }}
        run: |
          cd openwrt
          rm -rf build_dir target bin staging_dir packages dl/*
          cd .. && rm -rf openwrt
