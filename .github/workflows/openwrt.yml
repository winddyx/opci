name: OpenWrt

on:
  push:
    branches: [main]
    paths: [config]
  repository_dispatch:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (skip cache)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: v25.12.4
  CONFIG_FILE: config
  UPLOAD_FIRMWARE: true
  UPLOAD_BIN_DIR: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 7200
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 清理冗余文件，释放空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          # 安装编译依赖
          sudo apt update -qq
          sudo apt install -yqq build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget
          # 系统清理
          sudo apt autoremove --purge -yqq
          sudo apt clean -qq
          sudo timedatectl set-timezone "$TZ"

      # ── 缓存加速：dl/ 下载目录 ──
      - name: Cache download directory
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('config/**') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      # ── 缓存加速：staging_dir + build_dir ──
      - name: Cache build directories
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir
          key: ${{ runner.os }}-build-${{ hashFiles('config/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Clone OpenWrt source
        run: |
          df -hT
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          # 更新软件源
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom config
        run: |
          [ -e files ] && mv files openwrt/files || true
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config || true

      - name: Download dependencies
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc) 2>/dev/null || true
          # 清理损坏的安装包
          find dl -size -1024c -delete

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log || true
          # 生成设备名称和时间戳
          DEVICE_NAME=$(grep -oP 'CONFIG_TARGET.*DEVICE_\K.*(?=y)' .config 2>/dev/null | head -1 || echo "unknown")
          FILE_DATE=$(date +"%Y%m%d%H%M")
          echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          echo "FILE_DATE=_${FILE_DATE}" >> $GITHUB_ENV

      - name: Check disk space
        if: ${{ !cancelled() }}
        run: df -hT

      - name: Upload full bin directory
        uses: actions/upload-artifact@v4
        if: ${{ steps.compile.outcome == 'success' && env.UPLOAD_BIN_DIR == 'true' }}
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin
          retention-days: 14

      - name: Cleanup build artifacts
        if: ${{ always() }}
        run: |
          cd openwrt
          # 保留 .config 和 feeds，删除编译产物释放空间
          rm -rf build_dir target bin staging_dir packages
          # 保留 dl/（已被缓存，但清理可释放空间）
          rm -rf dl/*
          cd ..
          rm -rf openwrt
